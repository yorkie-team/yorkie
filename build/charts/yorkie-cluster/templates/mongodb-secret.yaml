{{- if .Values.mongodb.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-users
  namespace: {{ .Values.yorkie.namespace }}
type: Opaque
stringData:
  MONGODB_DATABASE_ADMIN_USER: admin
  MONGODB_DATABASE_ADMIN_PASSWORD: admin123
  MONGODB_USER_ADMIN_USER: useradmin
  MONGODB_USER_ADMIN_PASSWORD: useradmin123
{{- end }}
