name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - "api/docs/**"
      - "build/charts/**"
      - "design/**"
      - "**/*.md"
      - "**/*.txt"
      - "**/.gitignore"

env:
  GO_VERSION: "1.24"

jobs:
  ci-target-check:
    runs-on: ubuntu-latest

    outputs:
      build: ${{ steps.ci-target-check.outputs.build }}
      bench: ${{ steps.ci-target-check.outputs.bench }}
      complex-test: ${{ steps.ci-target-check.outputs.complex-test }}
      load-test: ${{ steps.ci-target-check.outputs.load-test }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: CI target check by path
        uses: dorny/paths-filter@v3
        id: ci-target-check
        with:
          filters: |
            build: '**'
            bench:
              - 'test/bench/**'
              - 'pkg/**'
              - 'server/**'
              - 'client/**'
              - 'admin/**'
              - 'cluster/**'
              - 'api/converter/**'
            complex-test:
              - 'test/complex/**'
              - 'server/backend/database/**'
              - 'pkg/document/**'
              - 'client/**'
            load-test:
              - 'test/k6/**'
              - 'pkg/**'
              - 'server/**'
              - 'client/**'
              - 'admin/**'
              - 'cluster/**'
              - 'api/converter/**'

  build:
    name: build
    runs-on: ubuntu-latest

    needs: ci-target-check
    if: ${{ github.ref == 'refs/heads/main' || needs.ci-target-check.outputs.build == 'true' }}

    steps:
      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup buf action
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Check out code
        uses: actions/checkout@v4

      - name: Get tools dependencies
        run: make tools

      - name: Lint
        run: make lint

      - name: Lint proto files
        uses: bufbuild/buf-lint-action@v1

      - name: Build
        run: make build

      - name: Stack
        run: docker compose -f build/docker/docker-compose.yml up --build -d

      - name: Test
        run: go test -tags integration -race -coverprofile=coverage.txt -covermode=atomic -v ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.txt
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  bench:
    name: bench
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    needs: ci-target-check
    if: ${{ github.ref == 'refs/heads/main' || needs.ci-target-check.outputs.bench == 'true' }}

    steps:
      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
        run: npm install -g @anthropic-ai/claude-code

      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Checkout benchmark branch
        uses: actions/checkout@v4
        with:
          ref: yorkie-ci-benchmark
          path: benchmark-repo
        continue-on-error: true

      - name: Read previous benchmark result
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
        id: prev-bench
        run: |
          echo "PREV_BENCH_RESULT=null" >> $GITHUB_OUTPUT
          echo "PREV_COMMIT=null" >> $GITHUB_OUTPUT

          if [ -d "benchmark-repo" ] && [ -f "benchmark-repo/bench_result.txt" ]; then
            content=$(cat benchmark-repo/bench_result.txt | jq -R -s .)
            echo "PREV_BENCH_RESULT=$content" >> $GITHUB_OUTPUT
            if [ -f "benchmark-repo/commit_hash.txt" ]; then
              prev_commit=$(cat benchmark-repo/commit_hash.txt)
              echo "PREV_COMMIT=$prev_commit" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Stack
        run: docker compose -f repo/build/docker/docker-compose.yml up --build -d

      - name: Bench
        id: curr-bench
        run: |
          cd repo
          make bench
          content=$(cat output.txt | jq -R -s .)
          echo "BENCH_RESULT=$content" >> $GITHUB_OUTPUT

      - name: Parse benchmark results
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
        id: bench-parse
        env:
          PREV_BENCH_RESULT: ${{ steps.prev-bench.outputs.PREV_BENCH_RESULT }}
          CURR_BENCH_RESULT: ${{ steps.curr-bench.outputs.BENCH_RESULT }}
        run: |
          PARSED=$(node repo/scripts/ci/parse-bench.js)
          EOF_MARKER="BENCH_PARSE_EOF_$(date +%s)"
          echo "PARSED<<${EOF_MARKER}" >> $GITHUB_OUTPUT
          echo "$PARSED" >> $GITHUB_OUTPUT
          echo "${EOF_MARKER}" >> $GITHUB_OUTPUT

      - name: Analyze benchmark with Claude
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
        id: bench-analysis
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          SIGNIFICANT=$(echo '${{ steps.bench-parse.outputs.PARSED }}' | jq -r '.significantChangesTable // ""')
          GROUPED=$(echo '${{ steps.bench-parse.outputs.PARSED }}' | jq -r '.groupedTable // ""')

          if [ -z "$SIGNIFICANT" ]; then
            echo "ANALYSIS=No significant benchmark changes detected." >> $GITHUB_OUTPUT
            echo "VV_ANALYSIS=" >> $GITHUB_OUTPUT
            exit 0
          fi

          PROMPT="Analyze these Go benchmark changes (≥20% difference). Write 2-3 key observations as markdown bullets. Be concise, data-driven.

          Significant changes:
          ${SIGNIFICANT}

          Full data:
          ${GROUPED}"

          ANALYSIS=$(claude -p "$PROMPT" --model claude-sonnet-4-20250514 --max-tokens 1024 2>/dev/null || echo "Analysis unavailable.")

          EOF_MARKER="ANALYSIS_EOF_$(date +%s)"
          echo "ANALYSIS<<${EOF_MARKER}" >> $GITHUB_OUTPUT
          echo "$ANALYSIS" >> $GITHUB_OUTPUT
          echo "${EOF_MARKER}" >> $GITHUB_OUTPUT

          HAS_VV=$(echo '${{ steps.bench-parse.outputs.PARSED }}' | jq -r '.hasVersionVector // false')
          if [ "$HAS_VV" = "true" ]; then
            VV_DATA=$(echo '${{ steps.bench-parse.outputs.PARSED }}' | jq -r '[.grouped | to_entries[] | select(.key | test("VersionVector|SyncConcurrency"))] | map("\(.key): \(.value | tostring)") | join("\n")')
            VV_PROMPT="Compare Lamport vs VersionVector performance from this benchmark data. Provide a concise summary:

            ${VV_DATA}"
            VV_ANALYSIS=$(claude -p "$VV_PROMPT" --model claude-sonnet-4-20250514 --max-tokens 1024 2>/dev/null || echo "")
            EOF_VV="VV_EOF_$(date +%s)"
            echo "VV_ANALYSIS<<${EOF_VV}" >> $GITHUB_OUTPUT
            echo "$VV_ANALYSIS" >> $GITHUB_OUTPUT
            echo "${EOF_VV}" >> $GITHUB_OUTPUT
          else
            echo "VV_ANALYSIS=" >> $GITHUB_OUTPUT
          fi

      - name: Post benchmark comment to PR
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SIGNIFICANT_TABLE=$(echo '${{ steps.bench-parse.outputs.PARSED }}' | jq -r '.significantChangesTable // ""')
          GROUPED_TABLE=$(echo '${{ steps.bench-parse.outputs.PARSED }}' | jq -r '.groupedTable // ""')
          COMMIT_ID="${{ github.sha }}"
          PREV_COMMIT_ID="${{ steps.prev-bench.outputs.PREV_COMMIT }}"

          VV_SECTION=""
          if [ -n "${{ steps.bench-analysis.outputs.VV_ANALYSIS }}" ]; then
            VV_SECTION="
          ### Clock Analysis

          <details>
          <summary>Lamport vs VersionVector</summary>

          ${{ steps.bench-analysis.outputs.VV_ANALYSIS }}

          </details>
          "
          fi

          cat > /tmp/bench-comment.md << EOF
          <!-- yorkie-ci-benchmark n8n comment -->
          ## Go Benchmark Analysis 📊

          This is a comparison result between the previous(${PREV_COMMIT_ID}) and the current commit(${COMMIT_ID}).

          ### Significant Changes (≥20% difference)

          ${SIGNIFICANT_TABLE}

          ${{ steps.bench-analysis.outputs.ANALYSIS }}

          ${VV_SECTION}

          ### Detailed Test Results

          ${GROUPED_TABLE}
          EOF

          bash repo/scripts/ci/post-comment.sh \
            "${{ github.repository }}" \
            "${{ github.event.pull_request.number }}" \
            "<!-- yorkie-ci-benchmark n8n comment -->" \
            /tmp/bench-comment.md

      - name: Store benchmark result
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p benchmark-repo
          cp repo/output.txt benchmark-repo/bench_result.txt
          echo "${{ github.sha }}" > benchmark-repo/commit_hash.txt

          cd benchmark-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          if [ ! -d ".git" ]; then
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          fi

          git add bench_result.txt
          git add commit_hash.txt
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          git diff --staged --quiet || git commit -m "Update benchmark results at $TIMESTAMP"
          git checkout -B yorkie-ci-benchmark
          git push -f origin yorkie-ci-benchmark

          echo "Benchmark results have been pushed to yorkie-ci-benchmark branch"

  complex-test:
    name: complex-test
    runs-on: ubuntu-latest

    needs: ci-target-check
    if: ${{ github.ref == 'refs/heads/main' || needs.ci-target-check.outputs.complex-test == 'true' }}

    steps:
      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v3
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check out code
        uses: actions/checkout@v4

      - name: Check Docker Compose Version
        run: docker compose --version

      - name: Run the Config server, Shard 1 and Shard 2
        run: docker compose -f build/docker/sharding/docker-compose.yml up --build -d --wait config1 shard1-1 shard2-1

      - name: Initialize the Config server
        run: docker compose -f build/docker/sharding/docker-compose.yml exec config1 mongosh test /scripts/init-config1.js

      - name: Initialize the Shard 1
        run: docker compose -f build/docker/sharding/docker-compose.yml exec shard1-1 mongosh test /scripts/init-shard1-1.js

      - name: Initialize the Shard 2
        run: docker compose -f build/docker/sharding/docker-compose.yml exec shard2-1 mongosh test /scripts/init-shard2-1.js

      - name: Run the Mongos
        run: docker compose -f build/docker/sharding/docker-compose.yml up --build -d --wait mongos1

      - name: Initialize the Mongos
        run: docker compose -f build/docker/sharding/docker-compose.yml exec mongos1 mongosh test /scripts/init-mongos1.js

      - name: Run the tests with complex tag
        run: go test -tags complex -race -v ./test/complex/...

  load-test:
    name: load-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    needs: ci-target-check
    if: ${{ github.ref == 'refs/heads/main' || needs.ci-target-check.outputs.load-test == 'true' }}

    steps:
      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          path: repo
      - name: Stack
        run: docker compose -f repo/build/docker/docker-compose.yml up --build -d

      - name: Checkout load branch
        uses: actions/checkout@v4
        with:
          ref: yorkie-ci-load
          path: load-repo
        continue-on-error: true

      - name: Read previous load result
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
        id: prev-load
        run: |
          echo "PREV_LOAD_RESULT=null" >> $GITHUB_OUTPUT
          echo "PREV_LOAD_SUMMARY=null" >> $GITHUB_OUTPUT
          echo "PREV_COMMIT=null" >> $GITHUB_OUTPUT

          if [ -d "load-repo" ] && [ -f "load-repo/load_summary.json" ]; then
            content=$(cat load-repo/output.txt | jq -R -s .)
            echo "PREV_LOAD_RESULT=$content" >> $GITHUB_OUTPUT
            echo "PREV_LOAD_SUMMARY=$(jq -c . load-repo/load_summary.json)" >> $GITHUB_OUTPUT
            if [ -f "load-repo/commit_hash.txt" ]; then
              prev_commit=$(cat load-repo/commit_hash.txt)
              echo "PREV_COMMIT=$prev_commit" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Setup K6
        uses: grafana/setup-k6-action@v1

      - name: Start the server
        run: cd repo && make start

      - name: Run Presence Load test
        id: curr-load
        run: |
          cd repo
          sleep 5
          if ! k6 run test/k6/presence.ts --summary-export=summary.json | tee output.txt; then
           echo "::error::K6 load test failed"
           exit 1
          fi
          echo "LOAD_RESULT=$(cat output.txt | jq -R -s .)" >> $GITHUB_OUTPUT
          echo "LOAD_SUMMARY=$(jq -c . summary.json)" >> $GITHUB_OUTPUT
      - name: Run Stream Load test
        id: curr-load-stream
        run: |
          cd repo
          k6 run test/k6/presence-with-stream.ts
      - name: Run VersionVector Load test
        id: curr-load-versionvector
        run: |
          cd repo
          k6 run -e WITH_VERSION_VECTOR=true test/k6/presence.ts
      - name: Stop the server
        run: cd repo && make stop

      - name: Parse load test results
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
        id: load-parse
        env:
          CURR_LOAD_RESULT: ${{ steps.curr-load.outputs.LOAD_RESULT }}
          CURR_LOAD_SUMMARY: ${{ steps.curr-load.outputs.LOAD_SUMMARY }}
          PREV_LOAD_SUMMARY: ${{ steps.prev-load.outputs.PREV_LOAD_SUMMARY }}
        run: |
          PARSED=$(node repo/scripts/ci/parse-load.js)
          EOF_MARKER="LOAD_PARSE_EOF_$(date +%s)"
          echo "PARSED<<${EOF_MARKER}" >> $GITHUB_OUTPUT
          echo "$PARSED" >> $GITHUB_OUTPUT
          echo "${EOF_MARKER}" >> $GITHUB_OUTPUT

      - name: Post load test comment to PR
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGE_TABLE=$(echo '${{ steps.load-parse.outputs.PARSED }}' | jq -r '.table // ""')
          RESULT=$(echo '${{ steps.load-parse.outputs.PARSED }}' | jq -r '.result // ""')
          COMMIT_ID="${{ github.sha }}"
          PREV_COMMIT_ID="${{ steps.prev-load.outputs.PREV_COMMIT }}"

          CHANGE_SECTION=""
          if [ -n "$CHANGE_TABLE" ] && [ "$CHANGE_TABLE" != "null" ]; then
            CHANGE_SECTION="### Change

          ${CHANGE_TABLE}"
          fi

          cat > /tmp/load-comment.md << EOF
          <!-- yorkie-ci-load n8n comment -->
          ## k6 Load Test 📊

          This is a comparison result between the previous(${PREV_COMMIT_ID}) and the current commit(${COMMIT_ID}).

          ${CHANGE_SECTION}

          ### Result

          <details>

          ${RESULT}

          </details>
          EOF

          bash repo/scripts/ci/post-comment.sh \
            "${{ github.repository }}" \
            "${{ github.event.pull_request.number }}" \
            "<!-- yorkie-ci-load n8n comment -->" \
            /tmp/load-comment.md

      - name: Store load result
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p load-repo
          cp repo/summary.json load-repo/load_summary.json
          cp repo/output.txt load-repo/output.txt
          echo "${{ github.sha }}" > load-repo/commit_hash.txt

          cd load-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          if [ ! -d ".git" ]; then
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          fi

          git add load_summary.json
          git add output.txt
          git add commit_hash.txt
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          git diff --staged --quiet || git commit -m "Update load results at $TIMESTAMP"
          git checkout -B yorkie-ci-load
          git push -f origin yorkie-ci-load

          echo "load results have been pushed to yorkie-ci-load branch"
