version: "2"
linters:
  enable:
    - goconst
    - gocyclo
    - goprintffuncname
    - gosec
    - lll
    - misspell
    - nakedret
    - revive
    - wrapcheck
  disable:
    - staticcheck
    - unused
  settings:
    gosec:
      excludes:
        - G107
        - G115
        - G118
    revive:
      rules:
        - name: unused-parameter
          disabled: true
    wrapcheck:
      ignore-sig-regexps:
        - github.com/yorkie-team/yorkie
        - context.Context
  exclusions:
    generated: lax
    rules:
      - linters:
          - gosec
        text: 'G112:'
      - linters:
          - lll
        path: api/types/updatable_project_fields.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/yorkie-team/yorkie
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
